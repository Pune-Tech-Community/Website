name: Satish Upadhyaya
bio: |-
  Satish Upadhyaya have been working with Microsoft 365, specifically with Unified Communications since the Lync 2010. Currently he is working with SOFTEL Communications Inc as a UC Architect.

  He has spent 8+ years working for a Microsoft UC specialist with focus on the Microsoft UC offering. He has been involved in all aspects of UC projects from presales, scoping, and design, through to deployment, support, and user adoption.

  He has a strong Telecom Expertise for the Telco regulation around the world in different countries based on the local Telco Laws.
