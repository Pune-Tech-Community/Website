name: Aroh Shukla
bio: |-
  Aroh Shukla is a Microsoft MVP for Business Applications and Data Platform and Microsoft Certified Trainer (MCT). He is an Office 365 consultant and a data enthusiast. Aroh's expertise lies in Power Platform, Microsoft Teams & SharePoint Online.

  Aroh has been sharing insights on different Microsoft solutions with his customers on key technologies such as SharePoint Online, Microsoft Teams, and Power BI. In spare time, he writes technical blogs, and is an active Toastmaster member.
