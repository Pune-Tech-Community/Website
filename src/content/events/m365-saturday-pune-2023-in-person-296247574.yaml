  Who can attend?

  This event is open to a wide range of participants, including IT professionals, developers, business users, and anyone interested in learning more about Microsoft 365 technologies.
  Having a basic understanding of Microsoft 365 technologies and related concepts can enhance your experience. This might include familiarity with tools such as SharePoint, Microsoft Teams, Power Platform, Azure Active Directory, and other components of the Microsoft 365 suite.
  Some sessions might target beginners, while others may assume a certain level of expertise.

  See you there!
