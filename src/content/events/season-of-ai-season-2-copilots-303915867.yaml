  Agenda:
  ⏰ 10:00 AM to 11:00 AM IST

  Build your own copilot using Teams AI library and .NET

  by Nanddeep Nachan and Smita Nachan
  In this session, you will learn how to integrate advanced AI capabilities with .NET, enhancing productivity and collaboration within Microsoft Teams. We'll explore how to leverage the Teams AI library for intelligent features, utilize the Teams Toolkit for streamlined development, and harness the power of Azure OpenAI to bring in Generative AI models.
  -------------------------------
  ⏰ 11:00 AM to 12:00 PM IST

  Build your own agent using Microsoft Copilot Studio

  by Siddharth Vaghasia and Kunj Sangani
  This session will introduce you to Microsoft Copilot Studio, a low-code platform that simplifies the development of personalized agents. Through live demonstrations, you'll learn how to use actions and AI prompts to craft intelligent agents tailored to your specific needs.

