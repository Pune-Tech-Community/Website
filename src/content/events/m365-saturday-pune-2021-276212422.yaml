description: |-
  M365 Saturday Pune event is a free community-focused event dedicated to educate and engage members of the local technical community. Our event draws upon the expertise of local IT Professionals, Users of Technology, Developers and Solution Architects who come together to share their real-world experiences, lessons learned, best practices, and general knowledge with other like-minded individuals​​.
  These individual experts Administrators, end-users, architect, developers and other professionals that work with Microsoft Collaboration or Cloud Technologies will bring invaluable experience and lessons across the broad suite of services like: SharePoint, Microsoft Teams, Power Platform, and other M365 applications.
  About the event: https://www.spsevents.org/event/punesps2021/
  Why attend M365 Saturday Pune?

  Network the peers and foster on-going relationships
  Learn new things on SharePoint and M365
  Share and improve SharePoint and M365 knowledge
  Speak to experts at the event

