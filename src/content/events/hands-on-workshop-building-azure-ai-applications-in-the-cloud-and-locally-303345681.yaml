  Whether you're a developer or AI enthusiast, this workshop will equip you with the tools and techniques to harness the power of cloud-based AI while working on your local machine.
  See you there!
  Workshop Pre-requisites

  Attendees should:

  Bring you own laptop
  Preferably carry your own internet connection
  Have basic Azure knowledge
  Have own Azure subscription with Azure OpenAI
  Have installed VS Code (latest version) on laptop.

