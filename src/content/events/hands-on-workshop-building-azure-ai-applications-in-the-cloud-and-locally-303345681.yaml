description: |-
  We are delighted to announce the Azure AI Hands-on Workshop to be conducted in-person in Pune on Wednesday, October 9, 2024.
  In this In-person hands-on workshop, we will explore how to interact and integrate with multi-modal large language models (LLMs) using Azure AI studio.
  Learn the essentials of interacting with LLMs to handle text, image, and audio inputs. Discover practical workflows for building and deploying AI-driven apps Using VS Code and AI Toolkit locally.
