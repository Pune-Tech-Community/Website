description: |-
  Let's explore how to take an AI chatbot from idea to production!
  In this session, we will build a ChatGPT-style application by calling Azure OpenAI endpoint, persist chat history with Azure Redis Cache, and containerize and deploy the full solution to Azure Kubernetes Service (AKS).
  This session is perfect for platform engineers and architects who want to understand how modern AI apps are deployed
