description: |-
  We are excited to have been invited to host the Microsoft 365 Copilot: Developer Camp Watch Party!
  We welcome anyone who wants to join us and learn more about Copilot extensibility and development along with the M365 North User Group!
  Microsoft is hosting a Developer Centric event around Microsoft 365 Copilot including Copilot Agents and Declarative Agents and more.
  Find out more about the Copilot Camp: https://www.youtube.com/watch?v=l4bCs34T6qM
  It will be a great way to come together and learn more about how we can extend this exciting platform.
  To get involved do the following:

  - Register for this event

  - Register for the Copilot Dev Camp before 17:00 on 7th Nov 2024 using

  https://aka.ms/copilotdevcamp/live

  - Join us on 7th November for this Virtual Watch Party
  -----------------------------------------------

  How to join?

  Join with MS Teams meetings

  -----------------------------------------------
